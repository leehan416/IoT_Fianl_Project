services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
      MQTT_DATA_TOPIC: marathon/gateways/+/data
      MQTT_EMERGENCY_TOPIC: marathon/gateways/+/emergency
    depends_on:
      - redis
      - mqtt

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  redis-data:
